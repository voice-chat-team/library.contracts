syntax = "proto3";

package user.v1;

import "common.proto";

service UserService {
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
  rpc GetUserForAuth(GetUserForAuthRequest) returns (GetUserForAuthResponse);
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
  rpc GetRangeUsersById(GetRangeUsersByIdRequest) returns (GetRangeUsersByIdResponse);
}

message GetRangeUsersByIdRequest {
  repeated string users_id = 1;
}

message GetRangeUsersByIdResponse {
  repeated common.v1.UserProfile users = 1;
}

message GetUserRequest {
  oneof identifier {
    string user_id = 1;
    string email = 2;
    string username = 3;
  }
}

message GetUserForAuthRequest {
  oneof identifier {
    string user_id = 1;
    string email = 2;
    string username = 3;
  }
}

message CreateUserRequest {
  string username = 1;
  string email = 2;
  string password_hash = 3;
}

message GetUserResponse {
  common.v1.UserProfile user = 1;
}

message GetUserForAuthResponse {
  common.v1.AuthUserProfile user = 1;
}

message CreateUserResponse {
  common.v1.UserProfile user = 1;
}
