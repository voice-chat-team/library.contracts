syntax = "proto3";

package guilds.v1;

service GuildService {
  rpc GetUserGuilds(GetUserGuildsRequest) returns (GetUserGuildsResponse);
  rpc CreateGuild(CreateGuildRequest) returns (CreateGuildResponse);
  rpc RemoveGuild(RemoveGuildRequest) returns (RemoveGuildResponse);
  rpc DeleteGuild(DeleteGuildRequest) returns (DeleteGuildResponse);
}

message Guild {
  string id = 1;
  string name = 2;
  optional string description = 3;
  bool is_public = 4;
  string created_at = 5;
  string updated_at = 6;
}

message GuildMember {
  string id = 1;
  string user_id = 2;
  string guild_id = 3;
  bool is_guild_owner = 4;
  bool is_banned = 5;
  string joined_at = 6;
  optional string banned_at = 7;
}

message CreateGuildRequest {
  string name = 1;
  optional string description = 2;
  bool is_public = 3;
}

message CreateGuildResponse {
  repeated Guild guilds = 1;
}

message GetUserGuildsRequest {
  string user_id = 1;
}

message GetUserGuildsResponse {
  repeated Guild guilds = 1;
}

message RemoveGuildRequest {
  string guild_id = 1;
  string user_id = 2;
}

message RemoveGuildResponse {
  bool success = 1;
}

message DeleteGuildRequest {
  string guild_id = 1;
  string user_id = 2;
}

message DeleteGuildResponse {
  bool success = 1;
}
