syntax = "proto3";

package guilds.v1;

import "common.proto";

service GuildService {
  rpc GetUserGuilds(GetUserGuildsRequest) returns (GetUserGuildsResponse);
  rpc GetGuildMembers(GetGuildMembersRequest) returns (GetGuildMembersResponse);
  rpc GetMemberById(GetMemberByIdRequest) returns (GetMemberByIdResponse);

  rpc CreateGuild(CreateGuildRequest) returns (CreateGuildResponse);
  rpc RemoveGuild(RemoveGuildRequest) returns (RemoveGuildResponse);
  rpc DeleteGuild(DeleteGuildRequest) returns (DeleteGuildResponse);

  rpc CreateChannel(CreateChannelRequest) returns (CreateChannelResponse);
  rpc GetGuildChannels(GetGuildChannelsRequest) returns (GetGuildChannelsResponse);
  rpc UpdateChannel(UpdateChannelRequest) returns (UpdateChannelResponse);
  rpc DeleteChannel(DeleteChannelRequest) returns (DeleteChannelResponse);
}

message Guild {
  string id = 1;
  string name = 2;
  optional string description = 3;
  bool is_public = 4;
  string created_at = 5;
  string updated_at = 6;
}

message GuildMember {
  string id = 1;
  string user_id = 2;
  string guild_id = 3;
  bool is_guild_owner = 4;
  bool is_banned = 5;
  string joined_at = 6;
  optional string banned_at = 7;
  common.v1.UserProfile user = 8;
}

message Channel {
  string id = 1;
  string guild_id = 2;
  string name = 3;
  ChannelType type = 4;
  bool is_private = 5;
  string created_at = 6;
  string updated_at = 7;
}

enum ChannelType {
  TEXT = 0;
  VOICE = 1;
}

message GetGuildMembersRequest {
  string guild_id = 1;
}

message GetGuildMembersResponse {
  repeated GuildMember members = 1;
}

message CreateGuildRequest {
  string name = 1;
  optional string description = 2;
  bool is_public = 3;
  string user_id = 4;
}

message CreateGuildResponse {
  Guild guild = 1;
}

message GetUserGuildsRequest {
  string user_id = 1;
}

message GetMemberByIdResponse {
  GuildMember member_info = 1;
}

message GetMemberByIdRequest {
  string user_id = 1;
}

message GetUserGuildsResponse {
  repeated Guild guilds = 1;
}

message RemoveGuildRequest {
  string guild_id = 1;
  string user_id = 2;
}

message RemoveGuildResponse {
  bool success = 1;
}

message DeleteGuildRequest {
  string guild_id = 1;
  string user_id = 2;
}

message DeleteGuildResponse {
  bool success = 1;
}

message CreateChannelRequest {
  string guild_id = 1;
  string name = 2;
  ChannelType type = 3;
  bool is_private = 4;
}

message CreateChannelResponse {
  Channel channel = 1;
}

message GetGuildChannelsRequest {
  string guild_id = 1;
}

message GetGuildChannelsResponse {
  repeated Channel channels = 1;
}

message UpdateChannelRequest {
  string channel_id = 1;
  optional string name = 2;
  optional bool is_private = 3;
}

message UpdateChannelResponse {
  Channel channel = 1;
}

message DeleteChannelRequest {
  string channel_id = 1;
  string guild_id = 2;
}

message DeleteChannelResponse {
  bool success = 1;
}
