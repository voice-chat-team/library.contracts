syntax = "proto3";

package common.v1;

message UserProfile {
  string id = 1;
  string username = 2;
  optional string email = 3;
  string avatar_url = 4;
  string created_at = 5;
  string updated_at = 6;
}

message AuthUserProfile {
  string id = 1;
  string username = 2;
  string email = 3;
  string avatar_url = 4;
  string password_hash = 5;
  string created_at = 6;
  string updated_at = 7;
}

enum GuildRoles {
  GUILD_ROLES_OWNER = 0;
  GUILD_ROLES_ADMIN = 1;
  GUILD_ROLES_MODERATOR = 2;
  GUILD_ROLES_MEMBER = 3;
}
